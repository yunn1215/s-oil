    # Start with a small grid. Expand only on a powerful computer.
    sequence_length: [3, 6]
    hidden_units: [8, 16]
    dropout: [0.0, 0.2]
    learning_rate: [0.001]
    batch_size: [8]
    epochs: 150
    patience: 12
    validation_fraction: 0.2
    seeds: [42]

evaluation:
  mape_on_level: false
